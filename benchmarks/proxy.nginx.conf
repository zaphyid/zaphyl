# nginx as a reverse proxy to the shared backend, with upstream keep-alive
# enabled so the comparison against Zaphyl and Caddy (which both pool upstream
# connections) is fair.
worker_processes  auto;
daemon            off;
error_log         /tmp/zaphyl-bench/proxy-nginx/error.log;
pid               /tmp/zaphyl-bench/proxy-nginx/nginx.pid;

events { worker_connections 4096; }

http {
    access_log off;

    proxy_temp_path       /tmp/zaphyl-bench/proxy-nginx/proxy_temp;
    client_body_temp_path /tmp/zaphyl-bench/proxy-nginx/client_temp;
    fastcgi_temp_path     /tmp/zaphyl-bench/proxy-nginx/fastcgi_temp;
    uwsgi_temp_path       /tmp/zaphyl-bench/proxy-nginx/uwsgi_temp;
    scgi_temp_path        /tmp/zaphyl-bench/proxy-nginx/scgi_temp;

    upstream backend {
        server 127.0.0.1:18080;
        keepalive 128;
    }

    server {
        listen 127.0.0.1:18083 reuseport;
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
