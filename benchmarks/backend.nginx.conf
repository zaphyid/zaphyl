# A fast, neutral origin shared by every proxy under test: it just returns a
# small fixed body so the proxy - not the backend - is the bottleneck.
worker_processes  auto;
daemon            off;
error_log         /tmp/zaphyl-bench/backend/error.log;
pid               /tmp/zaphyl-bench/backend/nginx.pid;

events { worker_connections 4096; }

http {
    access_log off;
    default_type text/plain;

    server {
        listen 127.0.0.1:18080 reuseport;
        location / {
            return 200 "hello from the benchmark backend\n";
        }
    }
}
