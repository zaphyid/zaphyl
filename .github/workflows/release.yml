name: Release

# Build and publish everything on a version tag: static Linux binaries (musl,
# so they run on any distro including Alpine), .deb/.rpm packages, a multi-arch
# container image, checksums, and a GitHub Release. Windows users run the image
# via Docker Desktop or build under WSL2 (Pingora is Linux-only).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create the GitHub Release first, with notes taken from CHANGELOG.md, so the
  # build jobs can attach their artifacts to it.
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract release notes for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md || echo "Zaphyl ${GITHUB_REF_NAME}" > release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          name: Zaphyl ${{ github.ref_name }}
          body_path: release-notes.md

  # Linux binaries for x86_64 and aarch64, built natively on each arch in the
  # same Debian image as the container (glibc 2.36+). Alpine/musl and older
  # distros are covered by the container image.
  binaries:
    needs: release
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    container: rust:1-bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cmake clang libclang-dev golang pkg-config libssl-dev
      - name: Build
        run: cargo build --release --locked --bin zaphyl
      - name: Package tarball + checksum
        run: |
          name="zaphyl-${GITHUB_REF_NAME}-${{ matrix.arch }}-linux"
          install -Dm755 target/release/zaphyl "$name/zaphyl"
          install -Dm644 zaphyl.example.toml "$name/zaphyl.example.toml"
          install -Dm644 README.md "$name/README.md"
          install -Dm644 LICENSE "$name/LICENSE"
          tar czf "$name.tar.gz" "$name"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.tar.gz.sha256

  # Native Debian/Ubuntu (.deb) and RHEL/Fedora/SUSE (.rpm) packages, each with a
  # hardened systemd unit (`systemctl start zaphyl`).
  packages:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev golang pkg-config libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install packagers
        run: cargo install cargo-deb cargo-generate-rpm --locked
      - name: Build binary
        run: cargo build --release --locked --bin zaphyl
      - name: Build .deb and .rpm
        run: |
          cargo deb -p zaphyl --no-build
          cargo generate-rpm -p crates/zaphyl
          ( cd target && sha256sum debian/*.deb generate-rpm/*.rpm > packages.sha256 )
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            target/packages.sha256

  # Multi-arch container image (amd64 + arm64) to GitHub Container Registry.
  # Runs on any distro/version with a container runtime, and on Windows via
  # Docker Desktop.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
